name: Secret scan

# Diff-only gitleaks backstop (docs/213). The stronger, earlier net is the
# server-side guard in `GitManager.autoCommit` (it blocks an agent commit before
# it happens); this CI check catches anything that reaches a PR by another path
# (a human push, a non-agent tool) using the SAME rules via `.gitleaks.toml`.
#
# Deliberately NO `paths-ignore` for docs/** or **.md — unlike ci.yml — because
# the historical leak this feature exists to prevent was a PAT committed into a
# `docs/*.md` file. Markdown must be scanned.
on:
  pull_request:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (diff-only)
    # Match ci.yml: only PRs whose branch lives in this repo. Fork PRs run on the
    # shared runner pool elsewhere; keep parity with the repo's security posture.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
        with:
          # Diff-only scan needs both endpoints of the range in local history.
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.18.4
          mkdir -p "$HOME/.local/bin"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" gitleaks
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Verify gitleaks
        run: gitleaks version
      # `--redact` keeps any match out of the (potentially public) CI log; the
      # range is base..head, so only this PR's commits are scanned, not history.
      - name: gitleaks (PR diff)
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --no-banner \
            --log-opts="--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
