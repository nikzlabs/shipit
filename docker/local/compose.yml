services:
  shipit:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ../..:/app
      - node_modules:/app/node_modules
      - workspace:/workspace
      - claude-auth:/root/.claude
    environment:
      - PORT=3001

  shipit-prod:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.prod
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - workspace:/workspace
      - claude-auth:/root/.claude
    environment:
      - NODE_ENV=production
      - PORT=3000
    profiles:
      - prod

volumes:
  node_modules:
  workspace:
  claude-auth:
