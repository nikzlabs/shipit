services:
  shipit:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3000:3000"
      - "3001:3001"
      - "5173:5173"
    volumes:
      - ../..:/app
      - node_modules:/app/node_modules
      - workspace:/workspace
      - credentials:/credentials
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3001
      - CLIENT_DEV_PORT=3000
      - VITE_API_HOST=localhost:3001
      - USE_CONTAINERS=true
      - WORKSPACE_VOLUME=local_workspace
      - CREDENTIALS_VOLUME=local_credentials
    networks:
      - shipit

  session-worker:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.session-worker
    image: shipit-session-worker:latest
    profiles:
      - build-only

  shipit-prod:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.prod
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - workspace:/workspace
      - credentials:/credentials
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - PORT=3000
      - USE_CONTAINERS=true
      - WORKSPACE_VOLUME=local_workspace
      - CREDENTIALS_VOLUME=local_credentials
    networks:
      - shipit
    profiles:
      - prod

networks:
  shipit:
    # Created by SessionContainerManager.ensureNetwork() at startup.
    # Using external: false so compose creates it if the app hasn't run yet.
    name: shipit
    driver: bridge

volumes:
  node_modules:
  workspace:
  credentials:
