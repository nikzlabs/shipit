name: Secret Scan

# Diff-only secret scan: fail any PR (or push to main) that introduces a
# credential. We deliberately scan ONLY the new commits, never full history —
# the repo carries a known, already-revoked PAT in old PR refs/commit messages,
# and a full-history scan would flag it on every run. See .gitleaks.toml for the
# allowlist. Note there is NO paths-ignore here: the one real leak this repo has
# seen lived in a docs/*.md file, so docs must stay in scope.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref, matching ci.yml.
concurrency:
  group: secret-scan-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks (diff only)
    # Skip fork PRs (consistent with ci.yml): ShipIt agents push to in-repo
    # branches, so this backstops exactly the "an agent committed a token" case.
    # External fork PRs are covered by GitHub's native secret scanning + push
    # protection once the repo is public.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
        with:
          # Need history so we can scan the base..head commit range.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Determine commit range
        id: range
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            before="${{ github.event.before }}"
            # First push to a new branch reports an all-zero "before" SHA; fall
            # back to the parent of the tip so we still scan the new commit(s).
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="$(git rev-parse 'HEAD~1' 2>/dev/null || git rev-parse HEAD)"
            fi
            echo "range=${before}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan diff for secrets
        run: |
          set -euo pipefail
          # --redact: never print the matched secret into public Actions logs.
          # detect + --log-opts scopes the scan to just the new commits.
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts="--no-merges ${{ steps.range.outputs.range }}" \
            --redact \
            --no-banner \
            --exit-code 1
