agent:
  # 4 GiB gives ~1 GiB of headroom over the peak RSS of `npm run lint`
  # (~2.85 GiB on the full type-aware run across all 697 TS files). At 3 GiB
  # the headroom was ~200 MiB, which the agent + dev server + tsc routinely
  # consumed, OOM-killing lint mid-run.
  memory: 4096
  cpu: 2.0
  pids: 2048
  # Keep this as a bare package-manager command so the session worker's
  # lockfile-keyed node_modules cache can materialize deps instead of
  # re-running the install. Shell wrappers intentionally bypass that fast path.
  install: npm install
# ShipIt-in-ShipIt (feature 118): tells the outer orchestrator to start the
# `dev` Compose service when this repo is opened. Without this line the
# `setupServiceManager` short-circuits on the missing `compose:` key and the
# inner UI never boots. See docs/118-shipit-ui-local/plan.md.
compose: docker-compose.yml
