name: CI

on:
  push:
    # Validate every commit that lands on the integration branch. This catches
    # direct pushes as well as the merge commit produced by a pull request.
    branches: [main]
  pull_request:
    # `main` is the integration branch; `stable` is the release maintenance
    # branch (docs/162/214). Run the gates on PRs into either so a release-bump
    # PR into `stable` gets a green check before merge — the same gates the
    # post-merge release.yml run re-runs to gate the publish.
    branches: [main, stable]
    # NOTE: deliberately NO `paths-ignore` here. These jobs are *required* status
    # checks in branch protection, and GitHub treats a trigger-level path skip
    # (paths-ignore) as a check that never reports — it sits "Expected / pending"
    # and blocks the PR from merging forever. A *job-level* `if:` skip, by
    # contrast, reports "success" and satisfies the requirement. So docs-only
    # changes are short-circuited at the job level (see the `changes` job +
    # `needs: changes` gating below), not by filtering the trigger.

# Cancel superseded runs. When a PR branch is pushed again before its CI
# finishes, the in-flight run is now wasted work — every new push used to start
# a fresh full run while the old one kept burning minutes to completion. Keying
# the group on the PR ref (head_ref on a pull_request) and cancelling in
# progress means only the latest commit's run survives. This is the largest
# Actions-minutes saving for an active repo. The release/tag workflow has no
# such group — a published tag's run must never be cancelled.
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Belt-and-suspenders: force any JavaScript actions still on Node.js 20 to
# run on Node.js 24. Our actions are pinned at v5 (which already use Node 24),
# but this guards against transitive uses by composite actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Cheap gate that decides whether the build-affecting jobs need to run. Lists
  # the files a PR changes vs its base; if every one is a doc/markdown file, the
  # heavy jobs below skip (and a skipped *job* reports "success", keeping a
  # docs-only PR mergeable under branch protection). A release-bump PR touches
  # package.json / package-lock.json (not docs), so it always runs the gates.
  # Pure git — no third-party action — to keep the dependency surface pinned.
  changes:
    name: Detect code changes
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # A push to main always runs the complete suite, including for
          # documentation-only commits. The diff optimization is only for PRs.
          if [ "$EVENT_NAME" = "push" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only "$BASE_SHA"...HEAD)
          echo "Changed files:"
          echo "$changed"
          if [ -z "$changed" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$changed" | grep -qvE '(^docs/|\.md$)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: Lint, Type Check & Build
    needs: changes
    # Only run for PRs whose branch lives in this repo (fork/external PRs have a
    # different head repo, so this skips them — no CI minutes on untrusted code),
    # and only when the PR touches build-affecting files (docs-only PRs skip).
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      # Cache node_modules itself, keyed on the lockfile. On a hit we skip the
      # extract/link work `npm ci` does even with a warm ~/.npm download cache
      # (setup-node's `cache: npm` only caches the tarballs, not the installed
      # tree). The key includes the Node major so a runtime bump busts it.
      #
      # actions/cache and setup-node's `cache: npm` use GitHub's standard
      # Actions Cache service over the network — portable to any runner,
      # including this self-hosted one.
      - uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-node24-${{ hashFiles('package-lock.json') }}
      - if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run check-deps
      - run: npm run build

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-node24-${{ hashFiles('package-lock.json') }}
      - if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm test
