# Production deployment for any Linux VPS with Docker.
# Binds to localhost only — Caddy reverse proxy handles public traffic + TLS.
#
# Usage:
#   docker compose build session-worker shipit
#   docker compose build session-worker-docker   # after session-worker (layers on :prod)
#   docker compose up -d
#
# (deploy.sh runs these in the right order.)

name: shipit

services:
  shipit:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:4123:4123"   # Orchestrator API — only via Caddy
      - "127.0.0.1:5173:5173"   # Vite client assets
    volumes:
      - workspace:/workspace
      - credentials:/credentials
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/shipit:/opt/shipit        # Host repo — for update checks and trigger file
    environment:
      - NODE_ENV=production
      - PORT=4123
      - USE_CONTAINERS=true
      - WORKSPACE_VOLUME=shipit_workspace
      - CREDENTIALS_VOLUME=shipit_credentials
      - DOCKER_NETWORK=shipit
      - SESSION_WORKER_IMAGE=shipit-session-worker:prod
      # docs/128 — docker-capable session image (Docker CLI + journalctl) used
      # for `capabilities.docker` sessions and ops sessions. Without this the
      # orchestrator falls back to the base image, so `docker`/`journalctl` are
      # missing and docker/ops sessions can't run their tooling. Built by the
      # `session-worker-docker` service below.
      - SESSION_WORKER_DOCKER_IMAGE=shipit-session-worker:docker
      - DOCKER_STACK=shipit
      # Session containers call back into the orchestrator for agent-owned
      # operations such as review comments and PR creation. Use the stable
      # Compose service DNS name instead of this container's ephemeral hostname
      # so existing sessions survive orchestrator container replacement.
      - SHIPIT_ORCHESTRATOR_HOST=shipit
      - SHIPIT_ORCHESTRATOR_FALLBACK_HOSTS=shipit
      # Production access paths should use subdomain previews. Cloudflare
      # already routes *.$DOMAIN through the tunnel; Tailscale/private DNS
      # needs an equivalent wildcard that resolves preview hostnames like
      # {sessionId}--{port}.shipit to this VPS.
      - SHIPIT_PREVIEW_SUBDOMAINS=always
      # Disk janitor — see src/server/orchestrator/disk-janitor.ts. Runs
      # once at orchestrator startup (no periodic timer). archiveSession
      # already drops the workspace at archive time; the 30-day workspace
      # sweep is a safety net for archives that failed mid-flight or
      # predate the cleanup code. Chat history, usage, and session
      # metadata are always preserved (unarchive re-clones from the bare
      # cache). Cache cutoff matches the in-code default; listed here for
      # visibility / easy per-host override.
      - DISK_JANITOR_ARCHIVED_WORKSPACE_DAYS=30
      - DISK_JANITOR_CACHE_DAYS=30
    networks:
      - shipit
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  session-worker:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.session-worker.prod
    image: shipit-session-worker:prod
    profiles:
      - build-only

  # docs/128 — docker-capable session image: the prod session worker plus the
  # Docker CLI and journalctl. Layers on shipit-session-worker:prod (BASE_IMAGE),
  # so it MUST be built after `session-worker` and WITHOUT --pull (the base is
  # local-only). deploy.sh handles the ordering. Selected at runtime via
  # SESSION_WORKER_DOCKER_IMAGE for `capabilities.docker` and ops sessions.
  session-worker-docker:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.session-worker.docker
      args:
        BASE_IMAGE: shipit-session-worker:prod
    image: shipit-session-worker:docker
    profiles:
      - build-only

networks:
  shipit:
    name: shipit
    driver: bridge

volumes:
  workspace:
  credentials:
