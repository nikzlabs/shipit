# ShipIt-in-ShipIt (feature 118 — dogfooding mode).
#
# When the ShipIt repo is opened in production ShipIt, the outer orchestrator
# starts this Compose stack as a session-scoped service. The `dev` service
# runs an *inner* orchestrator with RUNTIME_MODE=local, so it can serve the
# ShipIt UI from inside the outer session container without trying to spawn
# Docker containers of its own (which it can't — there's no nested Docker).
#
# The outer ShipIt picks up this service when the user starts it manually
# (because of the `x-shipit-preview: manual` marker), and the preview panel
# renders the inner UI on port 3000. The dogfooding inner orch is heavy
# (npm install + vite build + a second orch process), so we don't pay that
# cost on every session — it boots only when the user explicitly starts it.
#
# See docs/118-shipit-ui-local/plan.md for the full design.
services:
  dev:
    # Built from docker/Dockerfile.dogfood, which pre-installs node_modules
    # at /workspace/node_modules. The anonymous volume below seeds from that
    # path on first start, so every new outer session opens with deps already
    # in place instead of paying ~20s for a cold `npm install`.
    #
    # `image:` names the build output so Compose can reuse it across stack
    # restarts. The first session on a given outer host pays the build cost
    # once; subsequent sessions hit the Docker layer cache and start fast.
    build:
      context: .
      dockerfile: docker/Dockerfile.dogfood
    image: shipit-dogfood:local
    # `agent.install` from shipit.yaml does NOT run for compose services —
    # it only runs for session containers. So bake the install into the
    # service command. With the Dockerfile pre-baking node_modules, this
    # `npm install` is usually a fast lockfile verify; it only does real
    # work when the outer session's branch has lockfile drift vs. the image.
    # We keep `npm install` rather than `npm ci` so drift is tolerated
    # rather than fatal.
    # `mkdir -p` ensures SHIPIT_STATE_DIR exists before the inner orch
    # tries to open its SQLite db there (DatabaseManager doesn't create
    # parent dirs). Required because `.inner-shipit/` is in .gitignore
    # and won't exist on a fresh checkout.
    #
    # The orchestrator serves the React client as static files from
    # `dist/client/` (see `index.ts:454`). `npm run dev` only boots the
    # server — it does NOT build the client — so without an explicit
    # `vite build` step the inner UI 404s on every request. We build
    # once up front (so the server has something to serve at startup,
    # since fastifyStatic registers at boot and silently fails if the
    # directory is missing), then kick off `vite build --watch` in the
    # background so client edits are picked up live (full reload via
    # browser refresh — no HMR through the outer preview proxy in this
    # setup). Then run the server in the foreground.
    command: >
      sh -c "
      mkdir -p $${SHIPIT_STATE_DIR:-/workspace/.inner-shipit} &&
      npm install &&
      npm run build &&
      (npx vite build --watch >/tmp/vite-watch.log 2>&1 &) &&
      npm run dev
      "
    working_dir: /workspace
    # `init: true` enables a tini-style PID 1 so orphaned agent CLI
    # subprocesses are reaped. In containerized mode the kernel-level
    # cleanup handles this when the session container is destroyed; in
    # local mode the inner orch is the parent of every agent subprocess
    # and `init` is the safety net.
    init: true
    environment:
      RUNTIME_MODE: local
      PORT: 3000
      # Inner-orch's notion of "the workspace the user is editing." This
      # is the bind-mounted source tree below.
      WORKSPACE_DIR: /workspace
      # Move the inner orch's SQLite db, repo-cache, and dep-cache OUT of
      # the visible workspace so they don't pollute the outer agent's view
      # of the source tree (and don't get auto-committed). `.inner-shipit/`
      # is in .gitignore.
      SHIPIT_STATE_DIR: /workspace/.inner-shipit
    volumes:
      # Required: without this, /workspace inside the dev container is
      # empty. Bind-mounting the outer session's workspace lets the inner
      # orch see (and edit) the live ShipIt source.
      - .:/workspace
      # Anonymous volume that shadows /workspace/node_modules. Without
      # this, the outer agent container and this dev container both write
      # to the same bind-mounted /workspace/node_modules and:
      #   1. Concurrent tarball extraction races corrupt files (we saw
      #      `tsx` and `zustand` go missing with TAR_ENTRY_ERROR warnings).
      #   2. The agent container runs Node 24 while this service is on
      #      Node 22, so native modules like better-sqlite3 get a prebuilt
      #      binary for one ABI that fails to load under the other.
      # An anonymous volume gives the dev container its own node_modules.
      # Compose preserves it across container restarts (it's only recreated
      # when the service definition itself changes), so npm install caches.
      # We use anonymous instead of named because the orchestrator-generated
      # `.shipit/compose.override.yml` declares its own top-level `volumes:`
      # block, and compose's multi-file merge ends up dropping the user
      # file's top-level volume declarations — anonymous volumes don't
      # need a top-level entry.
      - /workspace/node_modules
    ports:
      - "3000:3000"
    # Tells the outer orchestrator to surface this service in the preview
    # panel, but only start it when the user explicitly requests it. The
    # inner orch is heavyweight (npm install + vite build + a second orch
    # process), so we don't pay that cost on every session boot. Once
    # started, the outer's preview proxy routes
    # `<sessionId>--3000.localhost` to this container.
    x-shipit-preview: manual
    # Forwards the user's existing Claude OAuth + GitHub token from the
    # outer (production) ShipIt into the inner orch as env vars. The inner
    # orch's AuthManager / GitHubAuthManager init from process.env, so the
    # inner UI is logged in from the start without re-running the OAuth
    # flow. Resolved by `platform-credentials.ts` — see Phase 4 of the
    # secrets pipeline.
    x-shipit-secrets:
      - { name: ANTHROPIC_API_KEY,    source: platform:claude_oauth }
      - { name: ANTHROPIC_AUTH_TOKEN, source: platform:claude_oauth }
      - { name: GITHUB_TOKEN,         source: platform:github_token }
