name: Release

# Auto-publish releases. Two triggers, one self-publishing workflow (docs/214):
#
#   - push to `stable` (the maintenance branch) — a release is cut by MERGING a
#     version-bump PR into `stable`. CI derives the tag `v<package.json version>`
#     from the merged commit, gates on a green build, creates + pushes the tag,
#     and publishes the GitHub Release. The agent never hand-pushes a tag.
#   - push of a `v*` tag — the rc / manual path. CI gates the existing tag and
#     publishes it (prereleases as GitHub prereleases).
#
# A tag pushed by THIS workflow (using GITHUB_TOKEN) does NOT re-trigger the
# `on: push: tags` path — so the branch path must gate, tag, AND publish in the
# same run. It does. `stable` is never *moved* by CI: CI only reads HEAD's
# version, tags that commit, and publishes. See docs/214-release-auto-publish and
# docs/162-release-channels, and RELEASING.md.

on:
  push:
    branches:
      - stable
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  # 0. Resolve the release tag + whether to proceed. Two ref shapes:
  #   - tag path  (`github.ref_type == tag`): tag = ref_name; never create a tag.
  #   - branch path (`stable` push): tag = v<version-from-package.json>. Decide:
  #       tag absent                       → new release, proceed.
  #       tag exists but Release missing   → repair (a prior run pushed the tag
  #                                          but `gh release create` failed) — proceed.
  #       tag exists AND Release present   → no-op (nothing new).
  #     A `-rc.N` version on the branch path is rejected — `stable` is for final
  #     releases; rc's use the tag path.
  resolve:
    name: Resolve release tag
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      is_branch: ${{ steps.resolve.outputs.is_branch }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      proceed: ${{ steps.resolve.outputs.proceed }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so we can check tag existence and diff notes.
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Resolve tag and proceed decision
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          if [ "$REF_TYPE" = "tag" ]; then
            # Tag path — gate + publish the pushed tag, never create one.
            TAG="$REF_NAME"
            if [[ "$TAG" == *-* ]]; then PRERELEASE=true; else PRERELEASE=false; fi
            {
              echo "is_branch=false"
              echo "tag=$TAG"
              echo "prerelease=$PRERELEASE"
              echo "proceed=true"
            } >> "$GITHUB_OUTPUT"
            echo "Tag path: $TAG (prerelease=$PRERELEASE)"
            exit 0
          fi

          # Branch path (`stable`) — derive the tag from the version source.
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          echo "is_branch=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # `stable` carries final releases only; rc's go through the tag path.
          if [[ "$VERSION" == *-* ]]; then
            echo "::error::package.json version ($VERSION) is a prerelease. The release branch is for final releases — cut release candidates via the tag path (a vX.Y.Z-rc.N tag)."
            exit 1
          fi
          echo "prerelease=false" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            # Tag already exists — proceed ONLY to repair a missing Release.
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG and its GitHub Release already exist — nothing to do."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Tag $TAG exists but its GitHub Release is missing — repairing."
              echo "proceed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No tag $TAG yet — new release from the branch path."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  # 1. The tag must match package.json. Tag path ONLY: a manual / rc tag is the
  # one case where the version source and the tag can drift, so we guard it. On
  # the branch path the tag is DERIVED from package.json (they can't drift), and
  # `github.ref_name` is `stable` (not vX.Y.Z), so this guard is skipped.
  version-guard:
    name: Tag matches package.json
    needs: [resolve]
    if: needs.resolve.outputs.proceed == 'true' && needs.resolve.outputs.is_branch != 'true'
    # Trivial job (one `node -p`): a 2vcpu runner is plenty. Blacksmith free
    # minutes scale inversely with vcpu (2vcpu costs half the quota per wall-
    # minute of 4vcpu), and a bigger machine gives no speedup here.
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Verify package.json version equals the tag
        env:
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match tag ($TAG). For a release-branch repo, releases are cut by merging a version-bump PR into the branch — see RELEASING.md."
            exit 1
          fi
          echo "OK: package.json $PKG matches tag $TAG"

  # 2. A release must be green — reuse the same gates as ci.yml.
  check:
    name: Lint, Type Check & Build
    needs: [resolve]
    if: needs.resolve.outputs.proceed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run check-deps
      - run: npm run build

  test:
    name: Test
    needs: [resolve]
    if: needs.resolve.outputs.proceed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # 3. On green: (branch path) create the annotated tag on $GITHUB_SHA and push
  # it, then publish the GitHub Release. The publish step checks RELEASE existence
  # (not just tag existence) so a prior run that pushed the tag but failed to
  # publish self-repairs. Serialized per resolved tag so a `stable` push and a
  # manual `vX.Y.Z` tag push for the same version can't both create the tag.
  publish:
    name: Publish GitHub Release
    needs: [resolve, version-guard, check, test]
    # version-guard is skipped on the branch path; `always()` + explicit result
    # checks let publish run when it was skipped (not failed). check/test must
    # have passed; resolve must have said proceed.
    if: >-
      always() &&
      needs.resolve.outputs.proceed == 'true' &&
      (needs.version-guard.result == 'success' || needs.version-guard.result == 'skipped') &&
      needs.check.result == 'success' &&
      needs.test.result == 'success'
    # Pure git + gh I/O, no compute — 2vcpu (see resolve note).
    runs-on: blacksmith-2vcpu-ubuntu-2404
    concurrency:
      group: release-${{ needs.resolve.outputs.tag }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so --generate-notes can diff against the previous tag.
          fetch-depth: 0

      # Branch path: create the annotated tag on the merged commit (only if it
      # doesn't already exist — a repair run reuses the prior tag). CI uses a
      # bot identity; the tag is the canonical release artifact.
      - name: Create and push the release tag
        if: needs.resolve.outputs.is_branch == 'true'
        env:
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists — repair run, not re-tagging."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG" "$GITHUB_SHA"
            git push origin "$TAG"
            echo "Created and pushed $TAG on $GITHUB_SHA."
          fi

      # Re-fetch tags so `--verify-tag` sees a tag this run just pushed (and any
      # tag from a racing run on the tag path).
      - name: Re-fetch tags
        run: git fetch origin --tags --force

      # Publish a GitHub Release with auto-generated, label-grouped notes (PR
      # titles since the previous tag). These notes are the inline changelog.
      # Skip if a Release already exists (idempotent repair / no-op). Prereleases
      # get the `--prerelease` flag.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
          PRERELEASE: ${{ needs.resolve.outputs.prerelease }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already published — nothing to do."
            exit 0
          fi
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            $PRERELEASE_FLAG
