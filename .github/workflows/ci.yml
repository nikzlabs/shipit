name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

# Cancel superseded runs. When a PR branch is pushed again before its CI
# finishes, the in-flight run is now wasted work — every new push used to start
# a fresh full run while the old one kept burning minutes to completion. Keying
# the group on the PR ref (head_ref on a pull_request) and cancelling in
# progress means only the latest commit's run survives. This is the largest
# Actions-minutes saving for an active repo. The release/tag workflow has no
# such group — a published tag's run must never be cancelled.
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Belt-and-suspenders: force any JavaScript actions still on Node.js 20 to
# run on Node.js 24. Our actions are pinned at v5 (which already use Node 24),
# but this guards against transitive uses by composite actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: Lint, Type Check & Build
    # Only run for PRs whose branch lives in this repo. Fork/external PRs have a
    # different head repo, so this skips them entirely — no CI minutes spent on
    # untrusted code, regardless of the repo's first-time-contributor setting.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      # Cache node_modules itself, keyed on the lockfile. On a hit we skip the
      # extract/link work `npm ci` does even with a warm ~/.npm download cache
      # (setup-node's `cache: npm` only caches the tarballs, not the installed
      # tree). The key includes the Node major so a runtime bump busts it.
      #
      # Keep this on upstream actions/cache — do NOT swap to useblacksmith/cache.
      # On a Blacksmith runner the GitHub cache API is transparently redirected
      # (network-level) to Blacksmith's colocated ~4x-faster store with zero
      # workflow changes, and the useblacksmith/* forks are now archived. Same
      # applies to setup-node's `cache: npm` above. See blacksmith.sh/blog/cache.
      - uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-node24-${{ hashFiles('package-lock.json') }}
      - if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run check-deps
      - run: npm run build

  test:
    name: Test
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-node24-${{ hashFiles('package-lock.json') }}
      - if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm test
