name: shipit-dev

services:
  shipit:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3000:3000"
      - "3001:3001"
      - "5173:5173"
    volumes:
      - ../../..:/app
      - node_modules:/app/node_modules
      - workspace:/workspace
      - credentials:/credentials
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3001
      - CLIENT_DEV_PORT=3000
      - VITE_API_HOST=localhost:3001
      - USE_CONTAINERS=true
      # docs/150 (SHI-31) — non-root session worker runtime. See deployment/vps
      # for the rationale; orchestrator HOME stays /root (auth.ts), only the
      # session containers run as shipit(1000).
      - SHIPIT_SESSION_WORKER_UID=1000
      - AGENT_HOME=/home/shipit
      - WORKSPACE_VOLUME=shipit-dev_workspace
      - CREDENTIALS_VOLUME=shipit-dev_credentials
      - DOCKER_NETWORK=shipit-dev
      - SESSION_WORKER_IMAGE=shipit-session-worker:dev
      - DOCKER_STACK=shipit-dev
      # Overlay dep store (docs/183) — opt-in passthrough. The orchestrator reads
      # OVERLAY_DEP_STORE from its own process env, so without this line a flag
      # set in the host shell never reaches the container. Empty (= off) unless
      # the operator exports OVERLAY_DEP_STORE=1 before `docker compose up`.
      - OVERLAY_DEP_STORE=${OVERLAY_DEP_STORE:-}
      # Prod parity (deployment/vps/docker-compose.yml): the orchestrator is reachable
      # on the bridge as the `shipit` service alias. The worker's SHIPIT_HOST is set
      # from this, and the Tier B egress resolver allowlists it — without it, an agent
      # under SESSION_EGRESS_DNS=1 can't resolve the orchestrator callback host
      # (SHI-90 Tier B host verification). Harmless when egress is off.
      - SHIPIT_ORCHESTRATOR_HOST=shipit
      - SHIPIT_ORCHESTRATOR_FALLBACK_HOSTS=shipit
    networks:
      - shipit-dev

  session-worker:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile.session-worker.dev
    image: shipit-session-worker:dev
    profiles:
      - build-only

  # Egress firewall sidecar (docs/172 Gap 1, SHI-90). Built into shipit-egress-sidecar:dev
  # and run by the orchestrator in the agent netns when SESSION_EGRESS_ENFORCE=1.
  # Build-only (like session-worker) — built by dev.sh, never started by `up`. Its
  # build context is `docker/` (the Dockerfile COPYs `egress-sidecar/*`), so the
  # context here is ../.. relative to this compose file. Without this, a change to
  # docker/egress-sidecar/ never reaches the running sidecar — it lags whatever was
  # last built manually (SHI-90 verification finding, 2026-06-15).
  egress-sidecar:
    build:
      context: ../..
      dockerfile: Dockerfile.egress-sidecar
    image: shipit-egress-sidecar:dev
    profiles:
      - build-only

networks:
  shipit-dev:
    name: shipit-dev
    driver: bridge

volumes:
  node_modules:
  workspace:
  credentials:
