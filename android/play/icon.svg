<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Google Play high-res listing icon (512x512). Full-bleed square: no margin
    and no rounded corners, because Play applies its own rounding, shadow, and
    masking. Mirrors the app launcher icon and the web favicon
    (src/client/public/favicon.svg): red gradient tile + white rocket knockout.
  -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0506e"/>
      <stop offset="1" stop-color="#b8294b"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed red gradient (no rounding/margin; Play rounds it on the store). -->
  <rect x="0" y="0" width="512" height="512" fill="url(#tile)"/>
  <!-- White rocket knockout, centered; same geometry as the favicon. -->
  <g transform="translate(256,256) scale(1.0485) translate(-256,-266)">
    <path d="M214 394 L256 472 L298 394 Z" fill="#ffd27a"/>
    <path d="M236 394 L256 440 L276 394 Z" fill="#fff6df"/>
    <path d="M256 60 C300 110 326 182 326 262 L326 352 Q326 382 296 394 L216 394 Q186 382 186 352 L186 262 C186 182 212 110 256 60 Z" fill="#fff"/>
    <path d="M186 300 L118 398 L186 374 Z" fill="#fff"/>
    <path d="M326 300 L394 398 L326 374 Z" fill="#fff"/>
    <circle cx="256" cy="212" r="46" fill="#b8294b"/>
  </g>
</svg>
