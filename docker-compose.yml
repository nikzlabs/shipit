# ShipIt-in-ShipIt (feature 118 — dogfooding mode).
#
# When the ShipIt repo is opened in production ShipIt, the outer orchestrator
# starts this Compose stack as a session-scoped service. The `dev` service
# runs an *inner* orchestrator with RUNTIME_MODE=local, so it can serve the
# ShipIt UI from inside the outer session container without trying to spawn
# Docker containers of its own (which it can't — there's no nested Docker).
#
# The outer ShipIt picks up this service when the user starts it manually
# (because of the `x-shipit-preview: manual` marker), and the preview panel
# renders the inner UI on port 3000. The dogfooding inner orch is heavy
# (npm install + vite build + a second orch process), so we don't pay that
# cost on every session — it boots only when the user explicitly starts it.
#
# See docs/118-shipit-ui-local/plan.md for the full design.
services:
  dev:
    # Built from docker/Dockerfile.dogfood — a thin node:24 + agent-CLIs image.
    # It no longer bakes node_modules: the `dev` service shares the agent
    # container's bind-mounted /workspace/node_modules (populated by
    # `agent.install`) instead of carrying its own copy. See the volumes and
    # command notes below, and feature 137 (docs/137-depends-on-install) for
    # the "share the install output instead of re-installing" rationale.
    #
    # `image:` names the build output so Compose can reuse it across stack
    # restarts. The first session on a given outer host pays the build cost
    # once; subsequent sessions hit the Docker layer cache and start fast.
    build:
      context: .
      dockerfile: docker/Dockerfile.dogfood
    image: shipit-dogfood:local
    # No `npm install` here anymore. The `dev` service now shares the agent
    # container's /workspace/node_modules (see volumes below), which
    # `agent.install` populates at session boot — so the deps are already in
    # place by the time the user manually starts this heavyweight service.
    # Running our own `npm install` would be both redundant AND unsafe: it
    # would write the *shared* tree concurrently with `agent.install`, which
    # is the tarball-extraction corruption race the old per-service
    # node_modules volume existed to avoid (feature 137 is the broader
    # "depend on install instead of racing it" move).
    #
    # 137's declarative gate (`x-shipit-depends-on-install`) only auto-applies
    # to `x-shipit-preview: auto` services — it does NOT cover this `manual`
    # service (`ServiceManager.startService` starts manual services on demand
    # without consulting the gate). So instead of the gate we use a tiny
    # wait-for-deps guard: block until `node_modules/.bin/vite` exists before
    # launching. In the common case agent.install finished long ago and this
    # is an instant check; it only ever waits if the user starts `dev` during
    # the brief boot-time install window.
    #
    # `mkdir -p` ensures SHIPIT_STATE_DIR exists before the inner orch
    # tries to open its SQLite db there (DatabaseManager doesn't create
    # parent dirs). Required because `.inner-shipit/` is in .gitignore
    # and won't exist on a fresh checkout.
    #
    # The agent CLIs (claude / codex) are NOT installed here — they're baked
    # into Dockerfile.dogfood. ServiceManager runs `docker compose up -d
    # --build`, so a changed Dockerfile.dogfood is always rebuilt and the
    # bake can't go stale on a host with an old cached `shipit-dogfood:local`.
    # See "Agent CLIs must be baked into the dev image" in
    # docs/118-shipit-ui-local/plan.md.
    #
    # Dev-mode wiring: Vite's dev server runs on the exposed port 3000
    # (so the outer preview proxy reaches it directly) and the inner
    # orchestrator runs on internal port 4000. Vite proxies `/api`,
    # `/ws`, and `/preview` to the orchestrator using `API_PORT=4000`
    # (see `vite.config.ts`). This gives real HMR through the outer
    # preview proxy (which already patches dev-server WS URLs in
    # `preview-proxy.ts`) — client edits hot-reload instead of
    # requiring a `vite build` round-trip.
    command: >
      sh -c "
      mkdir -p $${SHIPIT_STATE_DIR:-/workspace/.inner-shipit} &&
      while [ ! -x node_modules/.bin/vite ]; do
        echo '[dev] waiting for agent.install to populate node_modules…'; sleep 1;
      done &&
      (PORT=4000 npm run dev 2>&1 | sed 's/^/[orch] /' &) &&
      API_PORT=4000 exec npx vite --host 0.0.0.0 --port 3000
      "
    working_dir: /workspace
    # `init: true` enables a tini-style PID 1 so orphaned agent CLI
    # subprocesses are reaped. In containerized mode the kernel-level
    # cleanup handles this when the session container is destroyed; in
    # local mode the inner orch is the parent of every agent subprocess
    # and `init` is the safety net.
    init: true
    environment:
      RUNTIME_MODE: local
      # Note: the orchestrator's PORT (4000) and Vite's port (3000) are set
      # inline in the `command:` above, not here, because we run two
      # processes with different ports inside this single service.
      #
      # Inner-orch's notion of "the workspace the user is editing." This
      # is the bind-mounted source tree below.
      WORKSPACE_DIR: /workspace
      # Move the inner orch's SQLite db, repo-cache, and dep-cache OUT of
      # the visible workspace so they don't pollute the outer agent's view
      # of the source tree (and don't get auto-committed). `.inner-shipit/`
      # is in .gitignore.
      SHIPIT_STATE_DIR: /workspace/.inner-shipit
      # Force chokidar (used by both `tsx watch` for the server and
      # `vite build --watch` for the client) to use polling instead of
      # inotify. Without this, chokidar creates one inotify instance per
      # watched source file (~300+ files), which blows past the kernel's
      # `fs.inotify.max_user_instances` limit (commonly 128 on Linux
      # hosts) and crashes the dev server with:
      #   ENOSPC: System limit for number of file watchers reached
      # Polling avoids inotify entirely; the 1s interval keeps CPU low
      # while still feeling live. This also tends to be more reliable on
      # Docker bind-mounts, where inotify events propagating from the
      # host filesystem can be lossy depending on the host platform.
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "1000"
    volumes:
      # Required: without this, /workspace inside the dev container is
      # empty. Bind-mounting the outer session's workspace lets the inner
      # orch see (and edit) the live ShipIt source — INCLUDING
      # /workspace/node_modules, which is now shared with the agent container
      # rather than shadowed by a per-service volume.
      #
      # Why the old anonymous `- /workspace/node_modules` volume is gone:
      #   1. Concurrent-write corruption — the only thing that wrote the
      #      shared tree from this side was the in-command `npm install`,
      #      which we removed. With the dev service no longer installing,
      #      `agent.install` is the sole writer and there's no race.
      #   2. ABI mismatch — the dev image was Node 22 vs the agent's Node 24,
      #      so a shared tree's native modules wouldn't load. The dev image is
      #      now pinned to the SAME node:24 digest as the agent container
      #      (docker/Dockerfile.dogfood), so the agent-built better-sqlite3 /
      #      node-pty binaries load fine here.
      # Sharing the tree drops ~600MB of duplicate deps and a duplicate
      # install per session.
      - .:/workspace
    ports:
      - "3000:3000"
    # Tells the outer orchestrator to surface this service in the preview
    # panel, but only start it when the user explicitly requests it. The
    # inner orch is heavyweight (npm install + vite build + a second orch
    # process), so we don't pay that cost on every session boot. Once
    # started, the outer's preview proxy routes
    # `<sessionId>--3000.localhost` to this container.
    x-shipit-preview: manual
    # The inner orch's AuthManager / GitHubAuthManager init from process.env,
    # so the inner UI is logged in from the start. These are user-supplied
    # secrets: the dogfooding developer sets them once in the outer ShipIt's
    # Settings → Secrets panel, keyed by these names. Use a long-lived
    # ANTHROPIC_API_KEY (it does not rotate) + a dedicated testing GITHUB_TOKEN.
    x-shipit-secrets:
      - { name: ANTHROPIC_API_KEY }
      - { name: ANTHROPIC_AUTH_TOKEN }
      - { name: GITHUB_TOKEN }
