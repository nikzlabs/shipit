name: Release

# Publish a release: push an annotated tag `vX.Y.Z`, and this workflow gates it
# on a green build (version-guard + check + test) and publishes a GitHub Release
# with auto-generated notes. Those notes are the changelog ShipIt surfaces inline
# in the update panel.
#
# `stable` is a long-lived MAINTENANCE BRANCH, not a CI-moved pointer: releases
# are cut FROM `stable`, and maintainers cherry-pick fixes onto it (see
# RELEASING.md). CI never moves `stable` — the tag already sits on the stable
# commit the maintainer pushed. A prerelease tag (`vX.Y.Z-rc.N` — any semver with
# a `-prerelease` suffix) is published as a GitHub *prerelease*. See
# docs/162-release-channels/plan.md and RELEASING.md.

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  # 0. The tag must match package.json — a release tag is only ever cut via
  # `npm run release`, which bumps package.json and tags in lockstep. This guard
  # fails loudly if a tag is ever pushed without the matching bump, so the
  # human-facing version and the tag can never silently drift.
  version-guard:
    name: Tag matches package.json
    # Trivial job (one `node -p`): a 2vcpu runner is plenty. Blacksmith free
    # minutes scale inversely with vcpu (2vcpu costs half the quota per wall-
    # minute of 4vcpu), and a bigger machine gives no speedup here — so the
    # near-zero-compute jobs run at 2vcpu to conserve the free tier.
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Verify package.json version equals the tag
        run: |
          set -euo pipefail
          PKG="v$(node -p "require('./package.json').version")"
          TAG="${{ github.ref_name }}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match tag ($TAG). Cut releases with 'npm run release -- <version>' — see RELEASING.md."
            exit 1
          fi
          echo "OK: package.json $PKG matches tag $TAG"

  # 1. A release must be green — reuse the same gates as ci.yml.
  check:
    name: Lint, Type Check & Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run check-deps
      - run: npm run build

  test:
    name: Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # 2. On success, publish the GitHub Release. `stable` is a maintenance branch
  # the maintainer already pushed alongside the tag — CI does NOT move it
  # (see RELEASING.md). This job only classifies + publishes.
  publish:
    name: Publish GitHub Release
    needs: [version-guard, check, test]
    # Pure gh-release I/O, no compute — 2vcpu (see version-guard note).
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so --generate-notes can diff against the previous tag.
          fetch-depth: 0

      # A semver prerelease suffix (the `-` in `vX.Y.Z-rc.N`) marks a release
      # candidate: publish it as a GitHub prerelease.
      - name: Classify release
        id: classify
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "$TAG is a prerelease — publishing as a GitHub prerelease."
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Publish a GitHub Release with auto-generated notes (PR titles since the
      # previous tag). These notes are the inline changelog. Prereleases get the
      # `--prerelease` flag so the updater and operators can tell them apart.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ steps.classify.outputs.prerelease }}
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            $PRERELEASE_FLAG
