# Dependabot version-update config.
#
# Scope: the root npm manifest (package.json) only. The agent-CLI manifest
# under docker/agent-cli/ is owned by Renovate (see renovate.json), which
# already holds those bumps for a 7-day cooldown — Dependabot must not also
# touch that path, so `directory: "/"` keeps it to the root manifest.
#
# Cooldown mirrors the repo's dependency-age policy: scripts/check-dependency-age.ts
# enforces MIN_AGE_DAYS = 7 as a CI gate (`npm run check-deps`). Without a
# cooldown, Dependabot opens a bump PR the moment a release lands, and that PR
# sits red until the version ages past 7 days. `default-days: 7` makes
# Dependabot wait those 7 days before opening the PR, so by the time it exists
# `check-deps` already passes. Keep this number in sync with MIN_AGE_DAYS.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    # Versions must be exact pins (dependency policy in CLAUDE.md); Dependabot
    # edits the existing exact version in place, so this keeps it from widening
    # to a range.
    versioning-strategy: increase
    # Group coupled packages that share peer-dependency ranges into a single PR.
    # Without grouping, Dependabot bumps each package in isolation, so a coupled
    # set lands as separate PRs that each fail CI because their peers didn't move
    # in lockstep. Three observed cases (all real Dependabot breakages):
    #   - vite 7→8 failed `npm ci` (ERESOLVE) because @vitejs/plugin-react's peer
    #     range hadn't moved.
    #   - react 19.2.7 split from react-dom: react bumped alone broke every client
    #     test (react/react-dom must share a version); react-dom bumped alone hit
    #     ERESOLVE on react's peer.
    #   - @eslint/js 10 split from eslint core / typescript-eslint: an incoherent
    #     eslint-major state that fails lint.
    # Grouping each toolchain makes Dependabot bump them together in one
    # resolvable PR. Patterns are exact names (no trailing `*`) where a wildcard
    # would over-capture — e.g. `react` must not swallow react-markdown /
    # react-router-dom, which version independently.
    groups:
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "@tailwindcss/vite"
          - "vitest"
          - "@vitest/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
