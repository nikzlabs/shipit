<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"> <defs> <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"> <stop offset="0%" style="stop-color:#f8f9fc"/> <stop offset="100%" style="stop-color:#eef1f8"/> </linearGradient> <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="0%" y2="100%"> <stop offset="0%" style="stop-color:#e94560"/> <stop offset="50%" style="stop-color:#e94560"/> <stop offset="100%" style="stop-color:#c23152"/> </linearGradient> <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%"> <stop offset="0%" style="stop-color:#ff6b35"/> <stop offset="40%" style="stop-color:#f7c948"/> <stop offset="100%" style="stop-color:#f7c948;stop-opacity:0.3"/> </linearGradient> <linearGradient id="windowGrad" x1="0%" y1="0%" x2="100%" y2="100%"> <stop offset="0%" style="stop-color:#a8d8ea"/> <stop offset="100%" style="stop-color:#5eb7e0"/> </linearGradient> <filter id="glow"> <feGaussianBlur stdDeviation="6" result="blur"/> <feMerge> <feMergeNode in="blur"/> <feMergeNode in="SourceGraphic"/> </feMerge> </filter> <filter id="flameGlow"> <feGaussianBlur stdDeviation="10" result="blur"/> <feMerge> <feMergeNode in="blur"/> <feMergeNode in="SourceGraphic"/> </feMerge> </filter> <filter id="shadow"> <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.08"/> </filter> </defs> <!-- Background --> <rect width="512" height="512" rx="96" fill="url(#bgGrad)" stroke="#dde1ec" stroke-width="1"/> <!-- Subtle grid pattern --> <g opacity="0.06" stroke="#1a1a2e" stroke-width="1"> <line x1="0" y1="128" x2="512" y2="128"/> <line x1="0" y1="256" x2="512" y2="256"/> <line x1="0" y1="384" x2="512" y2="384"/> <line x1="128" y1="0" x2="128" y2="512"/> <line x1="256" y1="0" x2="256" y2="512"/> <line x1="384" y1="0" x2="384" y2="512"/> </g> <!-- Code bracket left < --> <text x="90" y="290" font-family="monospace" font-size="160" font-weight="bold" fill="#1a1a2e" opacity="0.08">&lt;</text> <!-- Code bracket right /> --> <text x="310" y="290" font-family="monospace" font-size="160" font-weight="bold" fill="#1a1a2e" opacity="0.08">/&gt;</text> <!-- Flame trail --> <g filter="url(#flameGlow)"> <path d="M256 400 L236 440 Q256 480 256 480 Q256 480 276 440 Z" fill="url(#flameGrad)" opacity="0.9"/> <path d="M240 395 L225 430 Q240 455 245 400 Z" fill="#ff6b35" opacity="0.6"/> <path d="M272 395 L287 430 Q272 455 267 400 Z" fill="#ff6b35" opacity="0.6"/> </g> <!-- Rocket body --> <g filter="url(#shadow)"> <!-- Main body --> <path d=" M256 80 C256 80 220 140 215 220 L215 340 Q215 360 235 370 L245 375 L245 395 L267 395 L267 375 L277 370 Q297 360 297 340 L297 220 C292 140 256 80 256 80 Z" fill="url(#rocketGrad)"/> <!-- Nose cone highlight --> <path d=" M256 80 C256 80 238 130 232 190 L232 200 Q244 180 256 80 Z" fill="#ffffff" opacity="0.3"/> <!-- Window --> <circle cx="256" cy="210" r="30" fill="url(#windowGrad)" stroke="#ffffff" stroke-width="3" opacity="0.9"/> <circle cx="248" cy="203" r="8" fill="#ffffff" opacity="0.5"/> <!-- Body stripe --> <rect x="220" y="290" width="72" height="6" rx="3" fill="#ffffff" opacity="0.2"/> <rect x="225" y="305" width="62" height="4" rx="2" fill="#ffffff" opacity="0.15"/> <!-- Left fin --> <path d="M215 310 L175 375 L175 385 Q185 380 215 360 Z" fill="#c23152" stroke="#e94560" stroke-width="1"/> <!-- Right fin --> <path d="M297 310 L337 375 L337 385 Q327 380 297 360 Z" fill="#c23152" stroke="#e94560" stroke-width="1"/> </g> <!-- Speed lines --> <g stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" opacity="0.08"> <line x1="140" y1="320" x2="140" y2="370"/> <line x1="160" y1="290" x2="160" y2="360"/> <line x1="352" y1="290" x2="352" y2="360"/> <line x1="372" y1="320" x2="372" y2="370"/> </g> <!-- Small dots --> <circle cx="120" cy="120" r="3" fill="#1a1a2e" opacity="0.08"/> <circle cx="400" cy="100" r="2" fill="#1a1a2e" opacity="0.06"/> <circle cx="380" cy="180" r="2.5" fill="#1a1a2e" opacity="0.06"/> <circle cx="130" cy="200" r="2" fill="#1a1a2e" opacity="0.06"/> <circle cx="100" cy="400" r="2" fill="#1a1a2e" opacity="0.05"/> <circle cx="410" cy="350" r="3" fill="#1a1a2e" opacity="0.05"/></svg>
