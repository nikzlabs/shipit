name: Android build

# Manually triggered only — no push or pull_request triggers. Each Android
# release happens on the operator's cadence, not on every commit.
on:
  workflow_dispatch:
    inputs:
      release:
        description: "Build a signed release APK + AAB (requires keystore secrets). When false, builds an unsigned debug APK."
        type: boolean
        default: false
      publish:
        description: "Also upload the signed AAB to Google Play (internal track). Requires release=true and the PLAY_SERVICE_ACCOUNT_JSON secret."
        type: boolean
        default: false

permissions:
  contents: write  # needed to attach release artifacts to a GitHub Release

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        if: ${{ inputs.release == false }}
        env:
          # Stamp the debug APK with a monotonic versionCode (the run number) so
          # each new build installs over the previous one. Without this the build
          # falls back to epoch seconds in build.gradle.kts; run_number is
          # deterministic and matches how the release steps below are versioned.
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Decode release keystore
        if: ${{ inputs.release == true }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          echo "ANDROID_KEYSTORE_PATH=$(pwd)/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK (signed)
        if: ${{ inputs.release == true }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Build release AAB (signed, for Play Store)
        if: ${{ inputs.release == true }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: gradle :app:bundleRelease --no-daemon --stacktrace

      - name: Upload debug APK artifact
        if: ${{ inputs.release == false }}
        uses: actions/upload-artifact@v6
        with:
          name: shipit-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK artifact
        if: ${{ inputs.release == true }}
        uses: actions/upload-artifact@v6
        with:
          name: shipit-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload release AAB artifact
        if: ${{ inputs.release == true }}
        uses: actions/upload-artifact@v6
        with:
          name: shipit-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Verify Play service-account secret
        if: ${{ inputs.release == true && inputs.publish == true }}
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::PLAY_SERVICE_ACCOUNT_JSON secret is not set — cannot publish to Google Play."
            exit 1
          fi

      # working-directory does not apply to `uses:` actions, so releaseFiles is
      # given relative to the repo root, not android/.
      - name: Upload AAB to Google Play (internal track)
        if: ${{ inputs.release == true && inputs.publish == true }}
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shipit.wrapper
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Clean up keystore
        if: ${{ always() && inputs.release == true }}
        run: rm -f release.keystore
