agent:
  # Keep this as a bare package-manager command: the session worker tunes a
  # bare `npm install` with `--prefer-offline --no-audit --no-fund` so it lands
  # fast on the warm download cache (/dep-cache). Shell wrappers bypass that
  # tuning.
  install: npm install
# ShipIt-in-ShipIt (feature 118): tells the outer orchestrator to start the
# `dev` Compose service when this repo is opened. Without this line the
# `setupServiceManager` short-circuits on the missing `compose:` key and the
# inner UI never boots. See docs/118-shipit-ui-local/plan.md.
compose: docker-compose.yml
# Release auto-publish (docs/214): ShipIt cuts releases by merging a version-bump
# PR into the `stable` maintenance branch. On merge, .github/workflows/release.yml
# derives the tag `v<package.json version>`, gates on a green build, tags the
# merged commit, and publishes the GitHub Release — no hand-pushed tags. See
# RELEASING.md.
release:
  mechanism: release-branch
  branch: stable
  version-source: package.json
