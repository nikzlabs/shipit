services:
  shipit:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3000:3000"
      - "3001:3001"
      - "5173:5173"
    volumes:
      - ../../..:/app
      - node_modules:/app/node_modules
      - workspace:/workspace
      - credentials:/credentials
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3001
      - CLIENT_DEV_PORT=3000
      - VITE_API_HOST=localhost:3001
      - USE_CONTAINERS=true
      - WORKSPACE_VOLUME=dev_workspace
      - CREDENTIALS_VOLUME=dev_credentials
      - DOCKER_NETWORK=shipit-dev
    networks:
      - shipit

  session-worker:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile.session-worker
    image: shipit-session-worker:latest
    profiles:
      - build-only

networks:
  shipit:
    name: shipit-dev
    driver: bridge

volumes:
  node_modules:
  workspace:
  credentials:
