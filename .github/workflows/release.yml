name: Release

# Auto-publish releases. Two triggers, one self-publishing workflow (docs/214):
#
#   - push to `stable` (the maintenance branch) — a release is cut by MERGING a
#     version-bump PR into `stable`. CI derives the tag `v<package.json version>`
#     from the merged commit, gates on a green build, creates + pushes the tag,
#     and publishes the GitHub Release. The agent never hand-pushes a tag.
#   - push of a `v*` tag — the rc / manual path. CI gates the existing tag and
#     publishes it (prereleases as GitHub prereleases).
#
# A tag pushed by THIS workflow (using GITHUB_TOKEN) does NOT re-trigger the
# `on: push: tags` path — so the branch path must gate, tag, AND publish in the
# same run. It does. `stable` is never *moved* by CI: CI only reads HEAD's
# version, tags that commit, and publishes. See docs/214-release-auto-publish and
# docs/162-release-channels, and RELEASING.md.

on:
  push:
    branches:
      - stable
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  # 0. Resolve the release tag + whether to proceed. Two ref shapes:
  #   - tag path  (`github.ref_type == tag`): tag = ref_name; never create a tag.
  #   - branch path (`stable` push): tag = v<version-from-package.json>. Decide:
  #       tag absent                       → new release, proceed.
  #       tag exists but Release missing   → repair (a prior run pushed the tag
  #                                          but `gh release create` failed) — proceed.
  #       tag exists AND Release present   → no-op (nothing new).
  #     A `-rc.N` version on the branch path is rejected — `stable` is for final
  #     releases; rc's use the tag path.
  resolve:
    name: Resolve release tag
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      is_branch: ${{ steps.resolve.outputs.is_branch }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      proceed: ${{ steps.resolve.outputs.proceed }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so we can check tag existence and diff notes.
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Resolve tag and proceed decision
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          if [ "$REF_TYPE" = "tag" ]; then
            # Tag path — gate + publish the pushed tag, never create one.
            TAG="$REF_NAME"
            if [[ "$TAG" == *-* ]]; then PRERELEASE=true; else PRERELEASE=false; fi
            {
              echo "is_branch=false"
              echo "tag=$TAG"
              echo "prerelease=$PRERELEASE"
              echo "proceed=true"
            } >> "$GITHUB_OUTPUT"
            echo "Tag path: $TAG (prerelease=$PRERELEASE)"
            exit 0
          fi

          # Branch path (`stable`) — derive the tag from the version source.
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          echo "is_branch=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # `stable` carries final releases only; rc's go through the tag path.
          if [[ "$VERSION" == *-* ]]; then
            echo "::error::package.json version ($VERSION) is a prerelease. The release branch is for final releases — cut release candidates via the tag path (a vX.Y.Z-rc.N tag)."
            exit 1
          fi
          echo "prerelease=false" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            # Tag already exists — proceed ONLY to repair a missing Release.
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG and its GitHub Release already exist — nothing to do."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Tag $TAG exists but its GitHub Release is missing — repairing."
              echo "proceed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No tag $TAG yet — new release from the branch path."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  # 1. The tag must match package.json. Tag path ONLY: a manual / rc tag is the
  # one case where the version source and the tag can drift, so we guard it. On
  # the branch path the tag is DERIVED from package.json (they can't drift), and
  # `github.ref_name` is `stable` (not vX.Y.Z), so this guard is skipped.
  version-guard:
    name: Tag matches package.json
    needs: [resolve]
    if: needs.resolve.outputs.proceed == 'true' && needs.resolve.outputs.is_branch != 'true'
    # Trivial job (one `node -p`): a 2vcpu runner is plenty. Blacksmith free
    # minutes scale inversely with vcpu (2vcpu costs half the quota per wall-
    # minute of 4vcpu), and a bigger machine gives no speedup here.
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Verify package.json version equals the tag
        env:
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match tag ($TAG). For a release-branch repo, releases are cut by merging a version-bump PR into the branch — see RELEASING.md."
            exit 1
          fi
          echo "OK: package.json $PKG matches tag $TAG"

  # 2. A release must be green — reuse the same gates as ci.yml.
  check:
    name: Lint, Type Check & Build
    needs: [resolve]
    if: needs.resolve.outputs.proceed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run check-deps
      - run: npm run build

  test:
    name: Test
    needs: [resolve]
    if: needs.resolve.outputs.proceed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # 3. On green: (branch path) create the annotated tag on $GITHUB_SHA and push
  # it, then publish the GitHub Release. The publish step checks RELEASE existence
  # (not just tag existence) so a prior run that pushed the tag but failed to
  # publish self-repairs. Serialized per resolved tag so a `stable` push and a
  # manual `vX.Y.Z` tag push for the same version can't both create the tag.
  publish:
    name: Publish GitHub Release
    needs: [resolve, version-guard, check, test]
    # version-guard is skipped on the branch path; `always()` + explicit result
    # checks let publish run when it was skipped (not failed). check/test must
    # have passed; resolve must have said proceed.
    if: >-
      always() &&
      needs.resolve.outputs.proceed == 'true' &&
      (needs.version-guard.result == 'success' || needs.version-guard.result == 'skipped') &&
      needs.check.result == 'success' &&
      needs.test.result == 'success'
    # Pure git + gh I/O, no compute — 2vcpu (see resolve note).
    runs-on: blacksmith-2vcpu-ubuntu-2404
    concurrency:
      group: release-${{ needs.resolve.outputs.tag }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so --generate-notes can diff against the previous tag.
          fetch-depth: 0

      # Branch path: create the annotated tag on the merged commit (only if it
      # doesn't already exist — a repair run reuses the prior tag). CI uses a
      # bot identity; the tag is the canonical release artifact.
      - name: Create and push the release tag
        if: needs.resolve.outputs.is_branch == 'true'
        env:
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists — repair run, not re-tagging."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG" "$GITHUB_SHA"
            git push origin "$TAG"
            echo "Created and pushed $TAG on $GITHUB_SHA."
          fi

      # Re-fetch tags so `--verify-tag` sees a tag this run just pushed (and any
      # tag from a racing run on the tag path).
      - name: Re-fetch tags
        run: git fetch origin --tags --force

      # Publish a GitHub Release with auto-generated, label-grouped notes (PR
      # titles since the previous tag). These notes are the inline changelog.
      # Skip if a Release already exists (idempotent repair / no-op). Prereleases
      # get the `--prerelease` flag.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
          PRERELEASE: ${{ needs.resolve.outputs.prerelease }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already published — nothing to do."
            exit 0
          fi
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            $PRERELEASE_FLAG

  # 4. Forward-port the released version onto `main` (SHI-172 follow-up). The
  # release bump lands ONLY on `stable` (the `release/<version>` PR), so without
  # this `main`'s package.json drifts behind every release — `main` keeps showing
  # the pre-release version forever. After a successful publish on the BRANCH path,
  # open (or leave) a small chore PR that bumps `main`'s package.json + lockfile to
  # the just-released version. A PR (not a direct push) respects `main`'s branch
  # protection and surfaces inline in ShipIt as a PR card; the user merges it to
  # bring `main` in sync. Idempotent: no-op when `main` already carries the version
  # (repair re-runs) or when the sync branch already exists. rc's (tag path) never
  # touch `main`, so this is gated to the branch path.
  sync-main:
    name: Sync version to main
    needs: [resolve, publish]
    if: >-
      always() &&
      needs.resolve.outputs.is_branch == 'true' &&
      needs.resolve.outputs.proceed == 'true' &&
      needs.publish.result == 'success'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Open version-sync PR if main is behind
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          CURRENT="$(node -p "require('./package.json').version")"
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "main already at $VERSION — nothing to sync."
            exit 0
          fi

          SYNC_BRANCH="release-sync/$TAG"

          # Idempotency keys on the PR, not the branch. A prior run can push the
          # branch and then fail to open the PR (e.g. GitHub blocks Actions from
          # creating PRs) — so "branch exists" does NOT imply "PR exists". Keying
          # on an open PR lets a re-run recover by (re)opening the PR for a branch
          # an earlier run already pushed.
          if [ -n "$(gh pr list --head "$SYNC_BRANCH" --base main --state open \
                       --json number --jq '.[0].number' 2>/dev/null)" ]; then
            echo "Open sync PR for $SYNC_BRANCH already exists — nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Reuse the branch if a prior run already pushed it (PR-create failed);
          # otherwise create it with the version bump. Same bump the local script +
          # the release PR use: rewrites package.json AND package-lock.json with no
          # git side effects, so the commit is ours.
          if git ls-remote --exit-code --heads origin "$SYNC_BRANCH" >/dev/null 2>&1; then
            echo "Reusing existing sync branch $SYNC_BRANCH (prior run pushed it but could not open the PR)."
            git fetch origin "$SYNC_BRANCH"
            git checkout -B "$SYNC_BRANCH" "origin/$SYNC_BRANCH"
          else
            git checkout -b "$SYNC_BRANCH"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            git add package.json package-lock.json
            git commit -m "Sync version to $TAG on main"
            git push origin "$SYNC_BRANCH"
          fi

          # Build the body with printf so no YAML/bash indentation leaks in as
          # leading whitespace (which markdown would render as a code block).
          BODY="$(printf '%s\n' \
            "Forward-ports the released version \`$VERSION\` (\`$TAG\`) onto \`main\`." \
            "" \
            "The release version bump lands only on \`stable\` (via the \`release/$VERSION\` PR), so \`main\`'s \`package.json\` would otherwise stay behind every release. Merging this keeps \`main\` in sync with the latest published release." \
            "" \
            "Safe to merge as-is — it only touches \`package.json\` + \`package-lock.json\`.")"

          # `ignore-for-release` keeps this version-bump PR out of the NEXT
          # release's auto-generated notes (it merges into main). A PR opened with
          # the default GITHUB_TOKEN does not re-trigger `on: pull_request`
          # workflows, so ci.yml won't run on it — acceptable for a version-only
          # bump that CI already vetted on the release commit.
          #
          # `gh pr create` fails closed if the repo/org has not enabled
          # "Allow GitHub Actions to create and approve pull requests"
          # (Settings → Actions → General → Workflow permissions). The branch is
          # already pushed, so surface an actionable message + a one-click compare
          # URL rather than a bare GraphQL error, and keep the job red so the
          # version drift is never silent.
          if ! gh pr create \
                 --base main \
                 --head "$SYNC_BRANCH" \
                 --title "Sync version to $TAG on main" \
                 --label ignore-for-release \
                 --body "$BODY"; then
            echo "::error title=Version-sync PR not created::Could not open the sync PR for $SYNC_BRANCH. If the failure is 'GitHub Actions is not permitted to create or approve pull requests', enable Settings → Actions → General → Workflow permissions → 'Allow GitHub Actions to create and approve pull requests' (at the org and/or repo level). The sync branch is already pushed — open the PR manually here: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/main...${SYNC_BRANCH}?expand=1"
            exit 1
          fi
