# gitleaks configuration — the CI backstop for ShipIt's commit-time secret guard.
#
# docs/213 — the SERVER-SIDE guard in `src/server/shared/secret-scan.ts` blocks a
# secret at auto-commit time (the early net). This file is the diff-only gitleaks
# CI check (the current-patterns net), and it MIRRORS that guard's rules + path
# allowlist so the two agree. When you edit `SECRET_RULES` or the path allowlist
# in `secret-scan.ts`, update this file in the same change.
#
# `useDefault = true` layers our rules ON TOP of gitleaks' built-in ruleset, so
# the CI check also tracks the upstream pattern updates the inline guard can't
# (e.g. a brand-new provider prefix) while our explicit rules guarantee parity
# with the inline guard — most importantly GitHub's 2026 stateless `ghs_…_JWT`
# token, which the default ruleset may not yet cover.
#
# Inline false-positive override: a line containing `gitleaks:allow` is skipped
# by BOTH gitleaks (built-in) and our inline guard, so it's the portable marker.
# (`shipit:allow-secret` is honored only by the inline guard.)

title = "ShipIt secret-scan"

[extend]
useDefault = true

# ---- Rules — mirror of secret-scan.ts SECRET_RULES ----

[[rules]]
id = "shipit-anthropic-api-key"
description = "Anthropic API key (sk-ant-)"
regex = '''sk-ant-[A-Za-z0-9_-]{20,}'''
keywords = ["sk-ant-"]

[[rules]]
id = "shipit-github-pat"
description = "GitHub personal access / OAuth / app token (gh[pousr]_)"
regex = '''gh[pousr]_[A-Za-z0-9]{36,}'''
keywords = ["ghp_", "gho_", "ghu_", "ghs_", "ghr_"]

[[rules]]
id = "shipit-github-fine-grained-pat"
description = "GitHub fine-grained personal access token (github_pat_)"
regex = '''github_pat_[A-Za-z0-9_]{40,}'''
keywords = ["github_pat_"]

[[rules]]
id = "shipit-github-app-token-stateless"
description = "GitHub App installation / Actions token, 2026 stateless format (ghs_…_JWT)"
# GitHub Changelog 2026-04-24: ghs_<appid>_<JWT>, ~520 chars, rolled out Apr–Jun 2026.
# The classic fixed-length ghs_ rule can't match it; this structural rule does.
regex = '''ghs_[A-Za-z0-9]+_eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'''
keywords = ["ghs_"]

[[rules]]
id = "shipit-aws-access-key-id"
description = "AWS access key ID (AKIA/ASIA)"
regex = '''\b(?:AKIA|ASIA)[A-Z0-9]{16}\b'''
keywords = ["AKIA", "ASIA"]

[[rules]]
id = "shipit-private-key-block"
description = "PEM private key block"
regex = '''-----BEGIN (?:RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'''
keywords = ["PRIVATE KEY"]

[[rules]]
id = "shipit-slack-token"
description = "Slack token (xox[baprs]-)"
regex = '''xox[baprs]-[A-Za-z0-9-]{10,}'''
keywords = ["xoxb-", "xoxa-", "xoxp-", "xoxr-", "xoxs-"]

[[rules]]
id = "shipit-jwt"
description = "JSON Web Token (eyJ…)"
regex = '''eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'''
keywords = ["eyJ"]

[[rules]]
id = "shipit-git-credential-url"
description = "Token embedded in a git remote URL (x-access-token:…@)"
regex = '''https?://(?:x-access-token|[A-Za-z0-9._-]+):[^\s/@:]{8,}@'''
keywords = ["x-access-token", "@github.com", "@gitlab.com"]

# ---- Allowlist — mirror of secret-scan.ts ALLOWLIST_PATH_PATTERNS ----
#
# Deliberately narrow: the detector + its tests, this config, and THIS feature's
# doc dir. We do NOT allowlist docs broadly — the historical leak was in a generic
# docs/*.md, so those must still be scanned.

[allowlist]
description = "Files that legitimately contain pattern-shaped fixtures"
paths = [
  '''(^|/)secret-scan\.ts$''',
  '''(^|/)secret-scan\.test\.ts$''',
  '''(^|/)git-secret-scan\.test\.ts$''',
  '''(^|/)secret-scan-notice\.ts$''',
  '''(^|/)secret-scan-notice\.test\.ts$''',
  '''(^|/)\.gitleaks\.toml$''',
  '''(^|/)docs/\d+-secret-scan-autocommit/''',
]
